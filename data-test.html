<!DOCTYPE html>
<html>
<head><title>Data Test</title></head>
<body>
<h2>SharePoint Data Load Test</h2>
<p id="status">Loading...</p>

<script src="https://teslamotorsinc.sharepoint.com/sites/TeslaSE-EHS/Shared%20Documents/Shared%20Documents/DashboardData/ehs_machines.js"></script>
<script src="https://teslamotorsinc.sharepoint.com/sites/TeslaSE-EHS/Shared%20Documents/Shared%20Documents/DashboardData/ehs_checks.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const m = window.MACHINES_DATA;
    const c = window.CHECKS_DATA;
    const el = document.getElementById('status');
    
    if (m && c) {
        el.innerHTML = '<span style="color:green;font-size:2rem">SUCCESS!</span><br><br>' +
            'Machines loaded: <b>' + (Array.isArray(m) ? m.length : 'object') + '</b><br>' +
            'Checks loaded: <b>' + (Array.isArray(c) ? c.length : 'object') + '</b><br><br>' +
            'Data can be loaded from SharePoint. Upload the full dashboard next!';
    } else {
        el.innerHTML = '<span style="color:red;font-size:2rem">FAILED</span><br><br>' +
            'MACHINES_DATA: ' + (m ? 'exists' : 'undefined') + '<br>' +
            'CHECKS_DATA: ' + (c ? 'exists' : 'undefined') + '<br><br>' +
            'SharePoint may be blocking cross-origin script loading.';
    }
});
</script>
</body>
</html>
